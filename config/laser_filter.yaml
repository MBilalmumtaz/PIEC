# Laser filter configuration for RSHELIOS LiDAR
scan_filter_chain:
- name: range
  type: laser_filters/RangeFilter
  params:
    lower_threshold: 0.1
    upper_threshold: 30.0
    use_message_range_limits: false

- name: shadow
  type: laser_filters/ScanShadowsFilter
  params:
    enabled: false
    min_angle: 10.0
    max_angle: 170.0
    neighbors: 20
    window: 1

- name: interpolation
  type: laser_filters/InterpolationFilter
  params:
    interpolation_method: linear
    max_valid_range: 30.0
